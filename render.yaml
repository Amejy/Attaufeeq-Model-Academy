services:
  - type: web
    name: attaufiqschools-api
    env: node
    rootDir: backend
    plan: starter
    buildCommand: npm install && npm run db:migrate
    startCommand: npm run start
    healthCheckPath: /api/health/ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_DATABASE
        value: "true"
      - key: TRUST_PROXY
        value: "true"
      - key: RATE_LIMIT_STORE
        value: redis
      - key: CACHE_STORE
        value: redis
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: attaufiqschools-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: AUTH_COOKIE_SAME_SITE
        sync: false
      - key: AUTH_COOKIE_SECURE
        sync: false
  - type: static
    name: attaufiqschools-web
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
  - type: redis
    name: attaufiqschools-redis
    plan: starter
