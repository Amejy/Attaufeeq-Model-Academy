services:
  - type: web
    name: attaufiqschools-api
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install
    preDeployCommand: npm run db:migrate
    startCommand: npm run start
    healthCheckPath: /api/health/ready
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: USE_DATABASE
        value: "true"
      - key: TRUST_PROXY
        value: "true"
      - key: RATE_LIMIT_STORE
        value: redis
      - key: CACHE_STORE
        value: redis
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: attaufiqschools-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: AUTH_COOKIE_SAME_SITE
        sync: false
      - key: AUTH_COOKIE_SECURE
        sync: false
      - key: MAIL_ENABLED
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_FROM_NAME
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_PROVIDER
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
  - type: web
    name: attaufiqschools-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    previews:
      generation: automatic
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
  - type: keyvalue
    name: attaufiqschools-redis
    plan: starter
